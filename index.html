<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omago Demo</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='210' height='210' viewBox='0 0 210 210' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='210' height='210' rx='45' fill='white'/%3E%3Ccircle cx='106' cy='102' r='52' stroke='%230A0A0A' stroke-width='26'/%3E%3Cpath d='M166 153C166 163.493 157.493 172 147 172C136.507 172 128 163.493 128 153C128 142.507 136.507 134 147 134C157.493 134 166 142.507 166 153Z' fill='white'/%3E%3Cpath d='M161 153C161 160.732 154.732 167 147 167C139.268 167 133 160.732 133 153C133 145.268 139.268 139 147 139C154.732 139 161 145.268 161 153Z' fill='%2339FF14'/%3E%3C/svg%3E">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #f0f6ff 0%, #dbeafe 30%, #bfdbfe 60%, #93c5fd 100%);
    }

    .blur-circle {
      position: absolute;
      border-radius: 50%;
    }

    .circle-1 {
      width: 400px;
      height: 400px;
      background: rgba(56, 129, 247, 0.07);
      top: 15%;
      left: 10%;
      filter: blur(60px);
    }

    .circle-2 {
      width: 250px;
      height: 250px;
      background: rgba(56, 129, 247, 0.10);
      top: 5%;
      right: 20%;
      filter: blur(40px);
    }

    .circle-3 {
      width: 300px;
      height: 300px;
      background: rgba(56, 129, 247, 0.05);
      bottom: 10%;
      right: 30%;
      filter: blur(50px);
    }
  </style>
</head>
<body>
  <div class="backdrop">
    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>
    <div class="blur-circle circle-3"></div>
  </div>

<script
  src="https://app.omago.ai/widget.js"
  data-chatbot="vhww9fsv"
  data-position="bottom-right"
></script> 
</body>
</html>
