<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omago Demo</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #f0f6ff 0%, #dbeafe 30%, #bfdbfe 60%, #93c5fd 100%);
    }

    .blur-circle {
      position: absolute;
      border-radius: 50%;
    }

    .circle-1 {
      width: 400px;
      height: 400px;
      background: rgba(56, 129, 247, 0.07);
      top: 15%;
      left: 10%;
      filter: blur(60px);
    }

    .circle-2 {
      width: 250px;
      height: 250px;
      background: rgba(56, 129, 247, 0.10);
      top: 5%;
      right: 20%;
      filter: blur(40px);
    }

    .circle-3 {
      width: 300px;
      height: 300px;
      background: rgba(56, 129, 247, 0.05);
      bottom: 10%;
      right: 30%;
      filter: blur(50px);
    }
  </style>
</head>
<body>
  <div class="backdrop">
    <div class="blur-circle circle-1"></div>
    <div class="blur-circle circle-2"></div>
    <div class="blur-circle circle-3"></div>
  </div>
<script
  src="https://app.omago.ai/widget.js"
  data-chatbot="vhww9fsv"
  data-position="bottom-right"
></script>
</body>
</html>
